<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio-Based Age Prediction - GitHub Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .banner {
            width: 1280px;
            height: 640px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        /* Animated background pattern */
        .pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.05) 35px, rgba(255,255,255,.05) 70px);
        }
        
        /* Waveform visualization */
        .waveform {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 0 50px;
            opacity: 0.2;
        }
        
        .wave-bar {
            width: 4px;
            background: white;
            border-radius: 2px;
            animation: wave 2s ease-in-out infinite;
        }
        
        .wave-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 70%; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 50%; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 60%; animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { height: 90%; animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { height: 55%; animation-delay: 0.6s; }
        .wave-bar:nth-child(8) { height: 75%; animation-delay: 0.7s; }
        .wave-bar:nth-child(9) { height: 65%; animation-delay: 0.8s; }
        .wave-bar:nth-child(10) { height: 85%; animation-delay: 0.9s; }
        .wave-bar:nth-child(11) { height: 45%; animation-delay: 1s; }
        .wave-bar:nth-child(12) { height: 70%; animation-delay: 1.1s; }
        .wave-bar:nth-child(13) { height: 55%; animation-delay: 1.2s; }
        .wave-bar:nth-child(14) { height: 80%; animation-delay: 1.3s; }
        .wave-bar:nth-child(15) { height: 60%; animation-delay: 1.4s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
        
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            color: white;
        }
        
        .icon {
            font-size: 100px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -2px;
            line-height: 1.1;
        }
        
        .subtitle {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0.95;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .features {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .feature-icon {
            font-size: 24px;
        }
        
        .tech-stack {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .tech-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .corner-accent {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .badge {
            background: rgba(255, 255, 255, 0.25);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        
        .github-icon {
            font-size: 40px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="banner">
        <!-- Background pattern -->
        <div class="pattern"></div>
        
        <!-- Waveform visualization -->
        <div class="waveform">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        
        <!-- Main content -->
        <div class="content">
            <div class="icon">🎙️</div>
            <div class="title">Audio-Based<br>Age Prediction</div>
            <div class="subtitle">ML-Powered Speaker Classification System</div>
            
            <div class="features">
                <div class="feature">
                    <span class="feature-icon">📊</span>
                    <span>15,000+ Samples</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🔬</span>
                    <span>MFCC Features</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🤖</span>
                    <span>ML Classification</span>
                </div>
            </div>
            
            <div class="tech-stack">
                <div class="tech-badge">Python</div>
                <div class="tech-badge">Librosa</div>
                <div class="tech-badge">Scikit-learn</div>
                <div class="tech-badge">Pandas</div>
                <div class="tech-badge">NumPy</div>
            </div>
        </div>
        
        <!-- Corner accent -->
        <div class="corner-accent">
            <div class="badge">⭐ Open Source</div>
            <div class="badge">🎓 FAST NUCES</div>
        </div>
    </div>
</body>
</html>
